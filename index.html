<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dima's Divine Dumplings</title>
  <link rel="stylesheet" href="style.css" />

  <!-- firebase start ****************************************-->
  <!-- Firebase App (core Firebase SDK) is always required & must be listed 1st -->
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-app.js"></script>
  <!-- Add Firebase products that you want to use -->
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-analytics.js"></script>
  <!-- firebase end ******************************************-->
  <script src="fb_setup.js"></script>
  <script type="module" src="fb_io.js"></script>
  <script type="module" src="script.js"></script>
</head>
<body>
  <div class="container">
    <h1>Dima's Divine Dumplings</h1>
    <h2>(and other delicious products)</h2>

    <button onclick="fb_login()">Login with Google</button>
    <button onclick="fb_logout()">Logout of Google</button>
    <form id="dumplingForm">
      <label for="name">Your Name:</label>
      <input type="text" id="name" name="name" required />

      <label for="favoriteFlavour">Favorite Dumpling Flavour:</label>
      <input type="text" id="favoriteFlavour" name="favoriteFlavour" required />

      <label for="servingsQuantity">How many servings per week?</label>
      <input type="number" id="servingsQuantity" name="servingsQuantity" required />

      <!-- add more fields here -->
    </form>

    <button onclick="writeForm()">Submit</button>

    <p id="statusMessage"></p>
  </div>
</body>
</html>
